<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:; font-src 'self' data:;">
  <title>Wulfy Browser</title>
  <link rel="icon" type="image/png" href="title-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header mit Navigation -->
    <header class="header">
      <div class="toolbar">
        <div class="brand-pill" aria-label="Wulfy Browser Branding">
          <img src="title-icon.png" alt="Wulfy Browser" class="brand-pill-icon">
          <span class="brand-pill-text">Wulfy</span>
        </div>

        <!-- Navigation Buttons Group -->
        <div class="btn-group">
          <button id="back-btn" class="nav-btn nav-btn-icon" title="Zurück (Alt+←)">◀</button>
          <button id="forward-btn" class="nav-btn nav-btn-icon" title="Vorwärts (Alt+→)">▶</button>
        </div>

        <div class="btn-group">
          <button id="refresh-btn" class="nav-btn nav-btn-icon" title="Neu laden (F5)">⟳</button>
          <button id="stop-btn" class="nav-btn nav-btn-icon" title="Stopp">⊘</button>
          <button id="home-btn" class="nav-btn nav-btn-icon" title="Startseite">⌂</button>
        </div>

        <!-- Adressleiste -->
        <div class="address-bar-wrapper">
          <input 
            type="text" 
            id="address-bar" 
            class="address-bar" 
            placeholder="URL eingeben oder suchen..." 
            autocomplete="off"
          />
          <div class="address-bar-icon">🔍</div>
        </div>

        <!-- Action Buttons Group -->
        <div class="btn-group">
          <button id="bookmark-btn" class="nav-btn nav-btn-icon" title="Zu Favoriten hinzufügen (Strg+D)">☆</button>
          <button id="bookmarks-menu-btn" class="nav-btn nav-btn-icon" title="Favoriten">★</button>
        </div>

        <!-- Panel Buttons Group -->
        <div class="btn-group">
          <button id="history-btn" class="nav-btn nav-btn-icon" title="Verlauf (Strg+H)">⌚</button>
          <button id="downloads-btn" class="nav-btn nav-btn-icon" title="Downloads (Strg+J)">↓</button>
          <button id="settings-btn" class="nav-btn nav-btn-icon" title="Einstellungen">⚙</button>
        </div>
        
        <!-- New Tab Button -->
        <button id="new-tab-btn" class="nav-btn nav-btn-new-tab" title="Neues Tab (Strg+T)">+ Neu</button>
      </div>

      <!-- Progress Bar -->
      <div id="progress-bar" class="progress-bar"></div>
    </header>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar">
      <!-- Tabs werden hier eingefügt -->
    </div>

    <!-- Bookmarks Panel -->
    <div id="bookmarks-panel" class="side-panel">
      <div class="panel-header">
        <h3>Favoriten</h3>
        <button id="close-bookmarks-btn" class="close-btn">✕</button>
      </div>
      <div id="bookmarks-list" class="panel-content">
        <!-- Favoriten werden hier eingefügt -->
      </div>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="side-panel">
      <div class="panel-header">
        <h3>Verlauf</h3>
        <button id="close-history-btn" class="close-btn">✕</button>
      </div>
      <input type="text" id="history-search" class="search-input" placeholder="Verlauf durchsuchen...">
      <div id="history-list" class="panel-content">
        <!-- History wird hier eingefügt -->
      </div>
    </div>

    <!-- Downloads Panel -->
    <div id="downloads-panel" class="side-panel">
      <div class="panel-header">
        <h3>Downloads</h3>
        <button id="close-downloads-btn" class="close-btn">✕</button>
      </div>
      <div class="panel-controls">
        <button id="clear-downloads-btn" class="small-btn">Alle löschen</button>
      </div>
      <div id="downloads-list" class="panel-content">
        <!-- Downloads werden hier eingefügt -->
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="side-panel">
      <div class="panel-header">
        <h3>Einstellungen</h3>
        <button id="close-settings-btn" class="close-btn">✕</button>
      </div>
      <div class="panel-content">
        <div class="settings-section">
          <h4>🎨 Design</h4>
          <div class="theme-toggle">
            <button id="theme-light-btn" class="theme-btn active" title="Light Mode">☀️ Hell</button>
            <button id="theme-dark-btn" class="theme-btn" title="Dark Mode">🌙 Dunkel</button>
          </div>
        </div>
        
        <div class="settings-section">
          <h4>🔍 Suchmaschine</h4>
          <select id="search-engine-select" class="search-select">
            <!-- Suchmaschinen werden hier eingefügt -->
          </select>
        </div>

        <div class="settings-section">
          <h4>🤖 KI-Assistent</h4>
          <button id="ai-settings-btn" class="settings-btn">KI Konfigurieren</button>
          <button id="ai-open-btn" class="settings-btn" style="margin-top: 10px;">KI-Chat öffnen</button>
        </div>
      </div>
    </div>

    <!-- Browser Container -->
    <div class="browser-container">
      <!-- WebViews werden hier dynamisch eingefügt -->
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
